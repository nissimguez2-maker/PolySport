<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0e1210">
  <title>PolySport — live</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28' fill='none' stroke='%234eba6f' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><circle cx='14' cy='14' r='12'/><polygon points='14,7 17.5,10 16.5,14.5 11.5,14.5 10.5,10'/><line x1='10.5' y1='10' x2='7' y2='13'/><line x1='17.5' y1='10' x2='21' y2='13'/><line x1='11.5' y1='14.5' x2='10' y2='18.5'/><line x1='16.5' y1='14.5' x2='18' y2='18.5'/><line x1='10' y1='18.5' x2='18' y2='18.5'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <style>
    :root {
      color-scheme: light dark;

      /* Neutrals — light warm-whites / dark pitch-greens per OS preference.
         Light palette deliberately avoids tinting toward green; on white
         surfaces a green tint reads as "seasick" rather than on-brand. */
      --bg:          light-dark(#fafaf7, #0e1210);
      --surface:     light-dark(#ffffff, #141a15);
      --surface2:    light-dark(#f0f1ec, #1a2219);
      --border:      light-dark(#e3e5df, #232e24);
      --border2:     light-dark(#cfd2ca, #2d3c2e);
      --muted:       light-dark(#6a6f68, #7a8c7c);
      --text:        light-dark(#1a1e1b, #e8ede9);
      --text-bright: light-dark(#0a0d0b, #f5f7f5);

      /* Semantic accents — darker on light for >4.5:1 text contrast; the
         bright dark-mode values stay because they read well on dark surface. */
      --green:       light-dark(#1f7a3d, #4eba6f);
      --red:         light-dark(#a81a1a, #e05252);
      --amber:       light-dark(#7d5b00, #d4a418);

      /* Derived tints and borders — color-mix pulls the active --green
         automatically, so one token family covers both themes. */
      --green-dim:           color-mix(in srgb, var(--green) 10%, transparent);
      --red-dim:             color-mix(in srgb, var(--red)   10%, transparent);
      --amber-dim:           color-mix(in srgb, var(--amber) 10%, transparent);
      --green-border:        color-mix(in srgb, var(--green) 25%, transparent);
      --green-border-strong: color-mix(in srgb, var(--green) 35%, transparent);
      --amber-border:        color-mix(in srgb, var(--amber) 25%, transparent);
      --amber-border-strong: color-mix(in srgb, var(--amber) 35%, transparent);
      --red-border:          color-mix(in srgb, var(--red)   25%, transparent);
      --red-border-strong:   color-mix(in srgb, var(--red)   35%, transparent);
      --red-border-alert:    color-mix(in srgb, var(--red)   35%, transparent);
      --red-bg-alert:        color-mix(in srgb, var(--red)    6%, transparent);

      /* Row-level state overlays. Hover is ink-on-light / white-on-dark. */
      --hover-overlay:       light-dark(rgba(0, 0, 0, 0.03), rgba(255, 255, 255, 0.022));
      --in-window-bg:        color-mix(in srgb, var(--amber) 5%, transparent);
      --in-window-bg-hover:  color-mix(in srgb, var(--amber) 8%, transparent);

      --font-ui:    'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-num:   'DM Mono', 'SF Mono', 'Courier New', monospace;
      --radius-sm:  4px;
      --radius-md:  7px;
      --radius-lg:  10px;
      --transition: 150ms cubic-bezier(0.16, 1, 0.3, 1);

      /* Spacing scale — operator-dashboard tight. Density-first per
         design principle #3, but rhythmically varied: 4–8px inside a
         tight grouping, 12–16px between siblings, 24–32px between
         major sections. We deliberately stay below the 48–64px range
         that would push this toward marketing-page territory. */
      --space-2xs: 4px;
      --space-xs:  8px;
      --space-sm:  12px;
      --space-md:  16px;
      --space-lg:  24px;
      --space-xl:  32px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-weight: 400;
      font-feature-settings: "cv11" 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { min-height: 100vh; font-variant-numeric: tabular-nums; margin: 0; }
    *, *::before, *::after { box-sizing: border-box; }

    /* Keyboard-only focus ring. Green matches the "active" brand signal. */
    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    /* Utility shims (replaces the handful of Bootstrap utility classes used below) */
    .container-fluid {
      width: 100%;
      max-width: 1800px;
      margin-right: auto;
      margin-left: auto;
      padding-right: 0.75rem;
      padding-left: 0.75rem;
    }
    .px-4 { padding-right: 1.5rem; padding-left: 1.5rem; }
    .d-flex { display: flex; }
    .align-items-start { align-items: flex-start; }
    .justify-content-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    .gap-3 { gap: 1rem; }

    .mono, .num { font-family: var(--font-num); font-variant-numeric: tabular-nums; }

    /* ─── Header ─────────────────────────────────────────────────────── */
    header.topbar {
      padding-top: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-lg);
    }
    .brand {
      display: flex; align-items: center; gap: var(--space-xs);
      color: var(--text);
    }
    .brand-mark { color: var(--text); }
    .brand-name {
      font-family: var(--font-ui);
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.005em;
      line-height: 1.1;
      color: var(--text-bright);
      margin: 0;
    }
    .brand-sub {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }
    /* Right-aligned header cluster: pills group tight inside their own
       sub-flex (var(--space-2xs)), then separator dots + meta-text sit
       at a wider gap (var(--space-sm)). Reads as three logical chunks —
       "[pills] · [active hours] · [trade zone]" — instead of one
       continuous string. */
    .meta-right {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-wrap: wrap;
      justify-content: flex-end;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .league-cluster {
      display: flex;
      align-items: center;
      gap: var(--space-2xs);
      flex-wrap: wrap;
    }
    .meta-sep { color: var(--border2); }
    .meta-text {
      font-family: var(--font-num);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ─── League pills (shared by header + table) ────────────────────── */
    .league {
      display: inline-block;
      font-family: var(--font-ui);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.2em 0.55em;
      border-radius: var(--radius-sm);
      line-height: 1;
      white-space: nowrap;
    }
    /* League pills — identity sub-palette. Text color flips darker on light
       so every pill carries enough contrast on both themes. */
    .league-epl { background: rgba(63,134,244,0.12);  color: light-dark(#1a5cc9, #6baff7); border: 1px solid rgba(63,134,244,0.25); }
    .league-ucl { background: rgba(100,80,200,0.12);  color: light-dark(#4a3a99, #9b8ff7); border: 1px solid rgba(100,80,200,0.25); }
    .league-l1  { background: rgba(212,100,40,0.12);  color: light-dark(#8a4418, #f0925a); border: 1px solid rgba(212,100,40,0.25); }
    .league-sa  { background: rgba(78,186,111,0.12);  color: light-dark(#1f7a3d, #4eba6f); border: 1px solid rgba(78,186,111,0.25); }
    .league-ll  { background: rgba(224,82,82,0.12);   color: light-dark(#a81a1a, #e87070); border: 1px solid rgba(224,82,82,0.25); }
    .league-bl  { background: rgba(212,164,24,0.12);  color: light-dark(#7d5b00, #d4a418); border: 1px solid rgba(212,164,24,0.25); }
    .league-mls { background: rgba(38,166,201,0.12);  color: light-dark(#0e6a87, #5cc4e0); border: 1px solid rgba(38,166,201,0.25); }
    .league-ere { background: rgba(245,140,82,0.12);  color: light-dark(#9c4612, #f0a06e); border: 1px solid rgba(245,140,82,0.25); }
    .league-pri { background: rgba(180,60,80,0.12);   color: light-dark(#871736, #df7088); border: 1px solid rgba(180,60,80,0.25); }
    .league-other { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* ─── KPI tiles (three tiers) ─────────────────────────────────────
       Vertical rhythm by intent:
         Tier 1 (primary numbers, big tiles)        ──┐
                                                      │  --space-md gap
         Tier 2 (system health strip, glance only)  ──┘
                                                      │  --space-lg gap to section-bar
         section-bar "Paper trades · 7d"             ──┐
                                                      │  --space-xs gap
         Tier 3 (paper-trade performance strip)     ──┘

       Inside each strip, gaps stay tight (--space-2xs / --space-xs) so
       sibling tiles read as one unit. Between groups they widen. The
       same operator scanning down the page hits a "tight, tight, beat,
       tight, tight, big beat" rhythm — that's intentional. */
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      height: 100%;
      transition: border-color var(--transition);
    }
    .kpi:hover { border-color: var(--border2); }
    .kpi-label {
      font-family: var(--font-ui);
      font-size: 0.656rem;  /* 10.5px */
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-weight: 500;
    }
    .kpi-value {
      font-family: var(--font-num);
      font-size: 1.625rem;  /* 26px */
      font-weight: 500;
      line-height: 1.1;
      margin-top: var(--space-2xs);
      color: var(--text-bright);
      letter-spacing: -0.005em;
    }
    .kpi-value.good    { color: var(--green); }
    .kpi-value.bad     { color: var(--red); }
    .kpi-value.caution { color: var(--amber); }
    .kpi-sub {
      font-family: var(--font-ui);
      font-size: 0.6875rem;  /* 11px */
      color: var(--muted);
      margin-top: var(--space-2xs);
    }

    /* Tier 1 — the three numbers an operator stares at. */
    .kpi-grid-primary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
    }
    @media (max-width: 900px) {
      .kpi-grid-primary { grid-template-columns: 1fr; }
    }
    .kpi-grid-primary .kpi { padding: var(--space-md) var(--space-lg); }
    .kpi-grid-primary .kpi-value { font-size: 2.125rem; /* 34px */ }
    .kpi-grid-primary .kpi-sub { font-size: 0.75rem; }

    /* Tier 2 — system health strip. Glance, don't dwell. Tighter gap
       than Tier 1 reinforces that these are a glance-row, not data
       you stop and read. */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: var(--space-2xs);
      margin-bottom: var(--space-lg);
    }
    @media (max-width: 1200px) {
      .kpi-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
      .kpi-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    .kpi-strip .kpi { padding: var(--space-xs) var(--space-sm); border-radius: var(--radius-md); }
    .kpi-strip .kpi-label { font-size: 0.625rem; /* 10px */ letter-spacing: 0.08em; }
    .kpi-strip .kpi-value { font-size: 0.95rem; /* ~15px */ margin-top: var(--space-2xs); }
    .kpi-strip .pulse { width: 6px; height: 6px; }

    /* Tier 3 — paper-trade performance. Same primitive as the health
       strip but only 4 tiles, so it gets a 4-column track. Without
       this override the strip used the 6-col grid and left an empty
       third on the right (the visible "void" the layout audit caught).
       Sits directly under its own section-bar — `margin-top: 0` keeps
       the bar and strip glued together as one logical unit. */
    .kpi-strip.is-perf {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 0;
    }
    @media (max-width: 1200px) {
      .kpi-strip.is-perf { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .pulse {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      vertical-align: middle;
      animation: breathe 2.4s ease-in-out infinite;
    }
    .pulse.dead { background: var(--red); animation: none; }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    @keyframes flashUpdate {
      0%   { opacity: 0.4; transform: translateY(-2px); }
      100% { opacity: 1;   transform: translateY(0); }
    }
    .flash-update { animation: flashUpdate 300ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @media (prefers-reduced-motion: reduce) {
      .pulse { animation: none; }
      .flash-update { animation: none; }
      .kpi { transition: none; }
      table.matches tbody tr { transition: none; }
    }

    /* ─── Section bar above table ──────────────────────────────────────
       Default: --space-xl above (major section break) and a tighter
       gap below (label glued to its content). Modifiers override the
       top space when a section bar should sit closer to what's above
       it (e.g. directly after Tier 2). */
    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--space-xl);
      padding-bottom: var(--space-xs);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-sm);
    }
    /* Used on the Paper-trade section-bar so it sits in normal rhythm
       under the Tier-2 strip rather than getting a section-sized break. */
    .section-bar.is-tight { margin-top: 0; }
    .section-label {
      font-family: var(--font-ui);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }
    .section-meta {
      font-family: var(--font-num);
      font-size: 0.6875rem;
      color: var(--muted);
    }

    /* ─── Matches table ──────────────────────────────────────────────── */
    .matches-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    table.matches {
      width: 100%;
      margin: 0;
      border-collapse: collapse;
      color: var(--text);
    }
    table.matches thead th {
      position: sticky; top: 0; z-index: 1;
      background: var(--surface2);
      font-family: var(--font-ui);
      font-size: 0.656rem;  /* 10.5px */
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.65rem 0.8rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      text-align: left;
    }
    table.matches thead th.end { text-align: right; }
    table.matches tbody td {
      padding: 0.85rem 0.8rem;
      border-top: 1px solid var(--border);
      font-size: 0.88rem;
      vertical-align: middle;
    }
    table.matches tbody td.end { text-align: right; }
    table.matches tbody tr {
      transition: background-color var(--transition);
    }
    table.matches tbody tr:hover {
      background: var(--hover-overlay);
    }
    table.matches tbody tr.in-window {
      background: var(--in-window-bg);
    }
    table.matches tbody tr.in-window:hover {
      background: var(--in-window-bg-hover);
    }
    table.matches tbody tr.buy {
      box-shadow: inset 3px 0 0 var(--green);
    }

    /* Kickoff split */
    .kickoff-date {
      font-family: var(--font-ui);
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }
    .kickoff-time {
      font-family: var(--font-num);
      font-size: 0.77rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* T pill */
    .t-pill {
      display: inline-block;
      font-family: var(--font-num);
      font-size: 0.77rem;
      font-weight: 500;
      padding: 0.22em 0.6em;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      line-height: 1.1;
    }
    .t-pill.pre    { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .t-pill.window { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
    .t-pill.live   { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-border); }

    /* Pin age chip — matches league-chip sizing; semantic by staleness */
    .age-chip {
      display: inline-block;
      font-family: var(--font-num);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 0.2em 0.55em;
      border-radius: var(--radius-sm);
      line-height: 1;
      white-space: nowrap;
    }
    .age-chip.fresh { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .age-chip.warn  { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
    .age-chip.stale { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-border); }
    .age-chip.none  { background: var(--surface2);  color: var(--muted); border: 1px solid var(--border); }

    /* Team names */
    .match-cell { max-width: 22rem; }
    .team-home {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text-bright);
      overflow-wrap: anywhere;
    }
    .team-away {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 0.92rem;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .vs-sep { color: var(--muted); font-size: 0.8rem; margin: 0 0.35rem; }

    /* Best cell — side + signed divergence (large), fair/mid (small) */
    .best-main {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      justify-content: flex-end;
    }
    .best-side-label {
      font-family: var(--font-ui);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .best-num {
      font-family: var(--font-num);
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.1;
    }
    .best-num.big { font-size: 1.15rem; }
    .best-sub {
      font-family: var(--font-num);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
      text-align: right;
    }
    .div-pos { color: var(--green); }
    .div-neg { color: var(--red); }

    /* Spread · Depth merged cell */
    .sd-cell { font-family: var(--font-num); font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
    .sd-sep { color: var(--muted); margin: 0 0.35rem; }
    .sd-cell .wide      { color: var(--amber); }
    .sd-cell .depth-low { color: var(--amber); }
    .sd-cell .depth-pos { color: var(--text); }

    /* Signal chips — prominent on both BUY and SKIP */
    .chip {
      display: inline-block;
      font-family: var(--font-ui);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.4em 0.85em;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      line-height: 1.1;
    }
    .chip-buy  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border-strong); }
    .chip-sell { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border-strong); }
    .chip-skip { background: transparent;      color: var(--text);  border: 1px solid var(--border2); }

    /* ─── Empty state ────────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .empty-state--error {
      border-color: var(--red-border-alert);
      background: var(--red-bg-alert);
    }
    .empty-state__title {
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.02em;
    }
    .empty-state__body {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }
    .empty-state__hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.3rem;
      opacity: 0.6;
    }
    .empty-state__label {
      margin-top: 1rem;
      font-weight: 500;
      color: var(--muted);
    }

    .table-responsive { overflow-x: auto; }
  </style>
</head>
<body>
<div class="container-fluid px-4">
  <header class="topbar">
    <div class="d-flex align-items-start justify-content-between flex-wrap gap-3">
      <div class="brand">
        <span class="brand-mark">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">

            <line x1="10.5" y1="10" x2="7" y2="13" stroke="currentColor" stroke-width="1.2"/>

            <line x1="11.5" y1="14.5" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.2"/>

            <line x1="10" y1="18.5" x2="18" y2="18.5" stroke="currentColor" stroke-width="1.2"/>

  <main id="content"
        hx-get="/fragment"
        hx-trigger="load, every 15s"
        hx-swap="innerHTML"
        hx-on:htmx:response-error="document.getElementById('content').innerHTML = document.getElementById('fragment-error').innerHTML"
        hx-on:htmx:send-error="document.getElementById('content').innerHTML = document.getElementById('fragment-error').innerHTML"
        hx-on:htmx:timeout="document.getElementById('content').innerHTML = document.getElementById('fragment-error').innerHTML">
    <div class="empty-state" role="status" aria-live="polite">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true" focusable="false">
        <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>

    </div>

    <div class="empty-state empty-state--error">
      <div class="empty-state__title">⚠ Dashboard fetch failed</div>
      <div class="empty-state__body">
        /fragment returned an error. Check Railway logs for the dashboard service.
        Retrying every 15s.
      </div>
    </div>
  </template>
</div>

<script>
  // Flash only the KPI tiles whose text content actually changed on a swap.
  // Keyed by the tile's kpi-label so the slot survives re-render.
  (function() {
    var lastValues = {};
    function snapshot() {
      var snap = {};
      document.querySelectorAll('#content .kpi').forEach(function(tile) {
        var label = tile.querySelector('.kpi-label');
        var value = tile.querySelector('.kpi-value');
        if (label && value) snap[label.textContent.trim()] = value.textContent.trim();
      });
      return snap;
    }
    document.addEventListener('htmx:beforeSwap', function(e) {
      if (e.detail.target.id === 'content') lastValues = snapshot();
    });
    document.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target.id !== 'content') return;
      document.querySelectorAll('#content .kpi').forEach(function(tile) {
        var label = tile.querySelector('.kpi-label');
        var value = tile.querySelector('.kpi-value');
        if (!label || !value) return;
        var key = label.textContent.trim();
        var now = value.textContent.trim();
        if (lastValues[key] !== undefined && lastValues[key] !== now) {
          value.classList.remove('flash-update');
          void value.offsetWidth;
          value.classList.add('flash-update');
        }
      });
    });
  })();
</script>
