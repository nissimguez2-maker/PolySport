<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PolySport — live</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg:        #0b0f14;
      --surface:   #11161d;
      --surface2:  #161c25;
      --border:    #222a35;
      --muted:     #7d8a9c;
      --text:      #d7dee8;
      --accent:    #4ade80;
      --accent2:   #60a5fa;
      --warn:      #fbbf24;
      --danger:    #f87171;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      font-feature-settings: "tnum" 1, "cv11" 1;
    }
    body { min-height: 100vh; }
    .container-fluid { max-width: 1700px; }

    /* Typography */
    h1.app-title {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.01em;
      margin: 0;
    }
    .app-subtitle { color: var(--muted); font-size: 0.95rem; font-weight: 400; }
    .muted { color: var(--muted); }

    /* KPI tiles */
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      height: 100%;
      transition: border-color 0.15s;
    }
    .kpi:hover { border-color: #2d3a4e; }
    .kpi-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
    }
    .kpi-value {
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.1;
      margin-top: 0.15rem;
      letter-spacing: -0.02em;
    }
    .kpi-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    /* Section titles */
    .section-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    .section-title .muted { text-transform: none; letter-spacing: 0; }

    /* Table */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .table-dark {
      --bs-table-bg: transparent;
      --bs-table-hover-bg: #1a222d;
      --bs-table-border-color: var(--border);
      color: var(--text);
      margin-bottom: 0;
    }
    .table-dark thead th {
      background: var(--surface2);
      border-bottom: 1px solid var(--border) !important;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.7rem 0.75rem;
      white-space: nowrap;
    }
    .table-dark tbody td {
      padding: 0.7rem 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.92rem;
      vertical-align: middle;
    }
    .row-window { background: #0f1a24 !important; }
    .row-window td { border-top-color: #243346 !important; }

    .t-code {
      background: var(--surface2);
      padding: 0.15em 0.5em;
      border-radius: 4px;
      color: var(--text);
      font-size: 0.85em;
    }
    .league {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--surface2);
      padding: 0.15em 0.55em;
      border-radius: 3px;
    }

    .div-pos { color: var(--accent); }
    .div-neg { color: var(--danger); }
    .div-big { font-weight: 700; }
    .best-num { font-size: 1.02rem; line-height: 1.1; }

    /* Chips */
    .chip {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: 4px;
      white-space: nowrap;
    }
    .chip-buy  { background: #0c3d1f; color: #86efac; border: 1px solid #14532d; }
    .chip-sell { background: #451a03; color: #fcd34d; border: 1px solid #78350f; }
    .chip-skip { background: #1a1f28; color: var(--muted); border: 1px solid var(--border); }

    /* Pulse */
    .pulse {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: pulse 1.6s infinite;
      margin-right: 0.35rem;
    }
    .pulse.dead { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }
    @keyframes pulse { 50% { opacity: 0.35; } }

    /* Header */
    header.topbar {
      padding: 1.2rem 0 0.3rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.4rem;
    }
  </style>
</head>
<body>
<div class="container-fluid px-4">
  <header class="topbar">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <div>
        <h1 class="app-title">PolySport</h1>
        <div class="app-subtitle">Phase 1 — live divergence monitor (Pinnacle vs Polymarket)</div>
      </div>
      <div class="muted small text-end">
        Pinnacle benchmark · 30s polling · EPL + UCL<br>
        Active window 12:00–24:00 IL
      </div>
    </div>
  </header>

  <div id="content"
       hx-get="/fragment"
       hx-trigger="load, every 15s"
       hx-swap="innerHTML">
    <div class="muted">loading…</div>
  </div>
</div>
</body>
</html>
