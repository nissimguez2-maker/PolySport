# Railway config for the dashboard service (per-service override).
# The dashboard service in Railway must have "Config as code" path set to
# `railway.dashboard.toml` so this file is used instead of the default
# `railway.toml` (which drives the phase1-logger service).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn polysport.dashboard.app:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
